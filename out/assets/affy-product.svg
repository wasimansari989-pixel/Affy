<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 400" fill="none">
  <defs>
    <linearGradient id="body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FDF8F4" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#FAF0E6" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#F5EDE0" stop-opacity="0.85"/>
    </linearGradient>
    <linearGradient id="cap" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#DFCFB8"/>
      <stop offset="40%" stop-color="#C5A880"/>
      <stop offset="100%" stop-color="#937854"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.4)"/>
      <stop offset="50%" stop-color="rgba(255,255,255,0)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.1)"/>
    </linearGradient>
    <linearGradient id="label" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FAF0E6"/>
      <stop offset="100%" stop-color="#F0E6D8"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="rgba(197,168,128,0.3)"/>
    </filter>
  </defs>
  <g filter="url(#shadow)">
    <!-- Cap -->
    <rect x="60" y="30" width="80" height="30" rx="8" fill="url(#cap)"/>
    <rect x="55" y="28" width="90" height="6" rx="3" fill="#DFCFB8" opacity="0.6"/>
    <rect x="62" y="32" width="76" height="4" rx="2" fill="url(#shine)"/>
    <!-- Neck -->
    <rect x="75" y="55" width="50" height="15" rx="4" fill="url(#body)"/>
    <rect x="75" y="55" width="50" height="15" rx="4" fill="url(#shine)"/>
    <!-- Body -->
    <path d="M50 70 Q50 65 55 65 L145 65 Q150 65 150 70 L150 320 Q150 340 130 340 L70 340 Q50 340 50 320 Z" fill="url(#body)"/>
    <path d="M50 70 Q50 65 55 65 L145 65 Q150 65 150 70 L150 320 Q150 340 130 340 L70 340 Q50 340 50 320 Z" fill="url(#shine)" opacity="0.5"/>
    <!-- Label -->
    <rect x="65" y="130" width="70" height="120" rx="6" fill="url(#label)" opacity="0.6"/>
    <rect x="65" y="130" width="70" height="120" rx="6" stroke="rgba(197,168,128,0.2)" stroke-width="0.5"/>
    <text x="100" y="160" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#2C2422" font-weight="700">AAFY</text>
    <text x="100" y="178" text-anchor="middle" font-family="system-ui" font-size="6" fill="#6B5E5A">NATURAL</text>
    <text x="100" y="188" text-anchor="middle" font-family="system-ui" font-size="6" fill="#6B5E5A">BEAUTY</text>
    <text x="100" y="198" text-anchor="middle" font-family="system-ui" font-size="6" fill="#6B5E5A">CREAM</text>
    <line x1="80" y1="210" x2="120" y2="210" stroke="rgba(197,168,128,0.3)" stroke-width="0.5"/>
    <text x="100" y="228" text-anchor="middle" font-family="system-ui" font-size="5" fill="#C5A880" font-weight="600">50ml / 1.7fl.oz</text>
    <!-- Bottom -->
    <path d="M50 330 Q50 350 70 350 L130 350 Q150 350 150 330" fill="url(#body)" opacity="0.7"/>
    <rect x="80" y="348" width="40" height="4" rx="2" fill="#E8DCCC" opacity="0.5"/>
    <!-- Side highlight -->
    <path d="M55 70 L55 330" stroke="rgba(255,255,255,0.3)" stroke-width="2" opacity="0.4"/>
  </g>
</svg>
